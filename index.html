
<!DOCTYPE html><html>
<head>
<title>Student Feedback Form</title>
<style>
body {
    font-family: Arial;
    background-color: gray;
}
form {
    width: 400px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head><body><h2 align="center">Student Feedback Form</h2><form onsubmit="submitForm(event)">Name:
<input type="text" id="name" required><br><br>
Email:
<input type="email" id="email" required><br><br>
Course:
<input type="text" id="course" required><br><br>
Semester:
<input type="number" id="sem" min="1" max="8" required><br><br>
<h3>ICLA Feedback</h3>
Subject:
<input type="radio" name="s1" value="Excellent" required> Excellent
<input type="radio" name="s1" value="Good"> Good
<input type="radio" name="s1" value="Average"> Average
<input type="radio" name="s1" value="Poor"> Poor
<br><br>
Rating:
<input type="range" id="rate1" min="1" max="10"><br><br>
<h3>SMP Feedback</h3>
Subject:
<input type="radio" name="s2" value="Excellent" required> Excellent
<input type="radio" name="s2" value="Good"> Good
<input type="radio" name="s2" value="Average"> Average
<input type="radio" name="s2" value="Poor"> Poor
<br><br>
Rating:
<input type="range" id="rate2" min="1" max="10"><br><br>
<input type="submit" value="Submit">
</form><script>
function submitForm(event) {
    event.preventDefault();
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let course = document.getElementById("course").value;
    let sem = document.getElementById("sem").value;
    let s1 = document.querySelector('input[name="s1"]:checked').value;
    let s2 = document.querySelector('input[name="s2"]:checked').value;
    let rate1 = document.getElementById("rate1").value;
    let rate2 = document.getElementById("rate2").value;
    alert(
        "Name: " + name +
        "\nEmail: " + email +
        "\nCourse: " + course +
        "\nSemester: " + sem +
        "\nICLA: " + s1 + " (" + rate1 + ")" +
        "\nSMP: " + s2 + " (" + rate2 + ")"
    );
}
</script></body>
</html>
